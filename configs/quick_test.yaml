project:
  seed: 42
  device: cpu
  num_workers: 0
  verbose: true
dataset:
  name: quick_test
  scale: 4
  hr_dir: outputs/quick_test_data/hr
  lr_dir: outputs/quick_test_data/lr
  crop_to_scale: true
augmentation:
  enabled: true
  apply_to_train: true
  apply_to_validation: true
  horizontal_flip: true
  vertical_flip: true
  rot90: true
training:
  epochs: 2
  batch_size: 2
  learning_rate: 0.001
  loss: mse
  k_folds: 2
  early_stopping_patience: 0
  save_images_per_fold: 0
hpo:
  enabled: true
  n_trials: 2
  epochs: 1
  batch_sizes:
  - 2
  lr_min: 0.0001
  lr_max: 0.001
  split_fraction_for_hpo: 0.5
models:
  simplified_edsr:
    num_features: 4
    num_blocks: 1
    res_scale: 0.1
outputs:
  root: outputs
  save_images: true
  save_plots: true
  show_plots: false
  save_checkpoints: false
