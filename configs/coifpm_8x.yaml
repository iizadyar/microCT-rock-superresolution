project:
  seed: 42
  device: auto
  num_workers: 0
  verbose: true
dataset:
  name: COIFPM
  scale: 8
  hr_dir: data/COIFPM/8x/hr
  lr_dir: data/COIFPM/8x/lr
  crop_to_scale: true
augmentation:
  enabled: true
  apply_to_train: true
  apply_to_validation: true
  horizontal_flip: true
  vertical_flip: true
  rot90: true
training:
  epochs: 150
  batch_size: 16
  learning_rate: 0.0001
  loss: mse
  k_folds: 5
  early_stopping_patience: 0
  save_images_per_fold: 0
hpo:
  enabled: true
  n_trials: 2
  epochs: 5
  batch_sizes:
  - 8
  - 16
  - 32
  lr_min: 1.0e-05
  lr_max: 0.001
  split_fraction_for_hpo: 0.5
models:
  simplified_edsr:
    num_features: 64
    num_blocks: 8
    res_scale: 0.1
outputs:
  root: outputs
  save_images: true
  save_plots: true
  show_plots: false
  save_checkpoints: true
